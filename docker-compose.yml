# PS5 Payloads Mirror — single-container web app (FastAPI serves the built
# React frontend and the JSON API). See WEBUI.md for details.
#
#   docker compose up -d --build      # start (build on first run)
#   docker compose logs -f            # follow logs
#   docker compose down               # stop & remove

services:
  mirror:
    build:
      context: .
      dockerfile: Dockerfile
    image: ps5-payloads-mirror:latest
    container_name: ps5-payloads-mirror
    restart: unless-stopped

    ports:
      # Host port is overridable via PORT in .env (defaults to 8000).
      - "${PORT:-8000}:8000"

    environment:
      # gh CLI uses this token to read github.com release metadata.
      # Non-GitHub hosts (e.g. Gitea) are reached directly and need no token.
      GH_TOKEN: ${GH_TOKEN:-}
      # Optional Basic Auth for the UI + management API (set both to enable).
      # /payloads.json and /api/health stay public regardless.
      MIRROR_AUTH_USER: ${MIRROR_AUTH_USER:-}
      MIRROR_AUTH_PASSWORD: ${MIRROR_AUTH_PASSWORD:-}
      # Optional "Publish to GitHub" button: set ALL four to enable commit+push
      # of payloads.json + README.md. GIT_PASSWORD must be a GitHub token (PAT).
      GIT_USERNAME: ${GIT_USERNAME:-}
      GIT_PASSWORD: ${GIT_PASSWORD:-}
      GIT_AUTHOR_NAME: ${GIT_AUTHOR_NAME:-}
      GIT_AUTHOR_EMAIL: ${GIT_AUTHOR_EMAIL:-}

    volumes:
      # Mount the whole repo so the container has the full git working tree
      # (incl. .git) for the "Publish to GitHub" button, and so payloads.json /
      # README.md / payloads/ persist on the host. The built frontend lives at
      # /opt/web/dist inside the image, so this mount does not hide it.
      - .:/app

    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8000/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
